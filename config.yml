#######################################################################
# Wiki.js - Configurație Producție
#######################################################################

port: 3000
bindIP: 0.0.0.0

# ---------------------------------------------------------------------
# Baza de date PostgreSQL (valorile vin din variabilele de mediu Render)
# ---------------------------------------------------------------------
db:
  type: postgres
  host: $(DB_HOST)
  port: $(DB_PORT)
  user: $(DB_USER)
  pass: $(DB_PASS)
  db: $(DB_NAME)
  ssl: true
  sslOptions:
    auto: true
    rejectUnauthorized: false
  schema: public

# ---------------------------------------------------------------------
# Pool conexiuni DB
# ---------------------------------------------------------------------
pool:
  min: 2
  max: 10

# ---------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------
logLevel: warn
logFormat: json

# ---------------------------------------------------------------------
# Mod offline (false = permite descărcarea extensiilor)
# ---------------------------------------------------------------------
offline: false

# ---------------------------------------------------------------------
# High Availability (false pentru instanță unică pe Render Free)
# ---------------------------------------------------------------------
ha: false

# ---------------------------------------------------------------------
# Date temporare (cache, upload-uri)
# ---------------------------------------------------------------------
dataPath: ./data

# ---------------------------------------------------------------------
# Limita body parser
# ---------------------------------------------------------------------
bodyParserLimit: 5mb
