############################################################
# render.yaml — Deploy Wiki.js pe Render
# Baza de date: Neon.tech (PostgreSQL extern)
############################################################

services:
  - type: web
    name: wiki-intern
    runtime: docker
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /healthz

    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
